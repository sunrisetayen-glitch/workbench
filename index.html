<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#ff5a5f" />
    <meta name="description" content="自媒体灵感工作台：集中管理各平台收藏，跨平台找参考" />
    <title>灵感工作台</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
    <link rel="icon" href="./assets/icons/icon-192.png" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-row">
        <h1 class="logo">✨ 灵感工作台</h1>
        <div class="topbar-tools">
          <button id="export-btn" class="tool-btn" title="导出备份">⬇</button>
          <button id="import-btn" class="tool-btn" title="导入备份">⬆</button>
          <input id="import-file" type="file" accept="application/json" hidden />
        </div>
      </div>
      <div class="search-wrap">
        <input id="search" class="search-input" type="search" placeholder="搜索标题 / 链接 / 标签 / 笔记" />
      </div>
      <div id="chips" class="chips"></div>
      <div class="tagcloud-row">
        <span class="tagcloud-label">标签云</span>
        <div id="tagcloud" class="tagcloud"></div>
      </div>
    </header>

    <main class="content">
      <div class="grid-meta"><span id="count">0 / 0</span></div>
      <section id="grid" class="grid"></section>
    </main>

    <button id="add-btn" class="fab" aria-label="添加收藏">＋</button>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
